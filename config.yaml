# ─────────────────────────────────────────────────────────────────
#  VoxCPM2 TTS service — configuration
#  All knobs you are likely to tweak live here. Restart the service
#  after editing. Every value can also be overridden by an env var
#  (see voxcpm_tts/config.py for the names, e.g. VOXTTS_PORT).
# ─────────────────────────────────────────────────────────────────

server:
  host: "0.0.0.0"
  port: 9824
  # Optional shared secret. When set, clients must send it as the
  # `X-API-Key` header. Leave empty/null to disable auth.
  api_key: null
  # Allowed CORS origins for the browser client. "*" = any origin.
  cors_origins: ["*"]

model:
  # HuggingFace repo id, or a local directory path to a downloaded model.
  name: "openbmb/VoxCPM2"
  # Where HuggingFace caches the weights. Keep this on a drive with room
  # (the 2B weights are ~4–5 GB). null = default (~/.cache/huggingface).
  hf_home: null
  # "cuda", "cuda:0", or "cpu". null = auto (cuda if available).
  device: null
  # Load the optional speech denoiser (ZipEnhancer, +~hundreds of MB of
  # VRAM/disk). Off for TTS — we synthesize clean audio, nothing to denoise.
  load_denoiser: false

  # ── Backend tunables ─────────────────────────────────────────────
  # torch.compile via VoxCPM's optimizer. Big win on datacenter GPUs, but on
  # few-SM parts (GB10/consumer) it adds startup compile time for little gain
  # ("Not enough SMs to use max_autotune_gemm"). Set false to skip compiling.
  optimize: true
  # cuDNN convolution backend. On brand-new GPUs (e.g. GB10 Blackwell) a SYSTEM
  # cuDNN in /lib can shadow the pip one and crash with
  # CUDNN_STATUS_SUBLIBRARY_VERSION_MISMATCH. Preferred fix: point
  # LD_LIBRARY_PATH at the venv's cuDNN (see README). Fallback: set this false
  # to bypass cuDNN entirely (native CUDA convs — slightly slower, no crash).
  cudnn_enabled: true
  # torch.set_float32_matmul_precision. "high"/"medium" = TF32 (faster on
  # Ampere+, negligible quality impact); "highest" = full fp32; null = leave
  # the torch default untouched.
  matmul_precision: high

voice:
  # ── Voice design prompt ──────────────────────────────────────────
  # VoxCPM2 "voice design": a parenthetical description prepended to the
  # text steers the timbre WITHOUT a reference clip. Tune this to taste.
  # English descriptors tend to be the most reliable; a Chinese one also
  # works. Leave empty to disable and let the model free-run.
  prompt: "(A sweet young girl's voice, warm and gentle, speaking clearly at a natural, lively pace)"
  # More voices in the README "Prompt cookbook". A few quick swaps:
  #   bright/upbeat: "(A bright, cheerful teenage girl's voice, friendly and energetic, clear and quick)"
  #   cute anime:    "(A cute anime-style girl's voice, high and bright, cheerful and fast-paced)"
  #   Chinese:       "(溫柔甜美的少女聲線，語氣親暱，語速自然輕快)"
  # Tip: "gentle/soft/whisper" slow the pace; "lively/upbeat/brisk" speed it up.
  # What goes between "(prompt)" and the text. " " (a space) or "" (none) —
  # this changes tokenization, so to reproduce a result from another tool
  # match its style exactly. Tip: to feed byte-identical text, set prompt: ""
  # here and send the full "(描述)內容" string as the request text.
  prompt_separator: " "

  # ── Reference voice clone (optional, most consistent) ────────────
  # Path to a short clean .wav of the target voice. When set, the service
  # clones it instead of (or in addition to) the voice-design prompt —
  # this is the most stable way to pin one identity. null = disabled.
  reference_wav: null
  # Transcript of reference_wav for "ultimate cloning" (highest fidelity).
  # null = ordinary cloning.
  reference_text: null

generation:
  # Fixed RNG seed → reproducible, stable timbre across calls. VoxCPM has
  # no seed arg, so we seed torch/numpy/random ourselves before each run.
  # Set to null for a fresh random voice every time.
  seed: 20240601
  # Classifier-free guidance: higher = sticks closer to the voice prompt.
  cfg_value: 2.0
  # Diffusion steps: higher = better quality but slower (10 is the default).
  inference_timesteps: 10
  # Run VoxCPM's text normalizer (numbers, punctuation → spoken form).
  normalize: true
  # Run the denoiser on the OUTPUT (needs model.load_denoiser: true above).
  denoise: false
  # VoxCPM auto-retries "bad" generations with changed conditions. Robust, but
  # it silently breaks fixed-seed reproducibility. Set false for strict,
  # repeatable output — e.g. when matching a voice generated in ComfyUI.
  retry_badcase: true
  retry_badcase_max_times: 3
  retry_badcase_ratio_threshold: 6.0
  # Hard cap on input length (characters). Longer text is truncated so a
  # single reply can't tie up the GPU for too long. null = no cap.
  max_chars: 400
  # Embed the generation params (seed/cfg/steps/prompt/text…) into each wav's
  # metadata (RIFF INFO "comment" tag). Handy for debugging what the live
  # service produced; read it back with `soundfile`/`ffprobe`.
  embed_meta: false

output:
  # Default response audio format: "mp3" or "wav". A request may override it
  # with {"format": "wav"}.
  format: mp3
  # How to treat parentheses in the REQUEST text. VoxCPM reads a leading "(...)"
  # as a voice-design prompt, so the spoken text's own brackets can be
  # misinterpreted. A request may override with {"paren_mode": "..."}:
  #   strip  (default) — drop the brackets, keep the words (→ a space)
  #   remove           — drop the brackets AND their inner text
  #   keep             — leave the text untouched
  paren_mode: strip
